<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Box Model</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <div class="title-box">
            <h1>Box Model</h1>
        </div>

        <div class="info-box">
            Every element on the page has its own box, which can be styled using CSS.
        </div>

        <div class="info-box">
            From the inside out:
        </div>

        <ul class="list">
            <li class="format">content</li>
            <li>padding</li>
            <li class="format">border</li>
            <li>margin</li>
        </ul>

        <h2>Background</h2>

        <div class="background-box">
            Keep in mind that a
            <span class="background-label">background</span>
            will cover the content and the padding.
        </div>

    </div>

</body>
</html>


<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">


<link rel="stylesheet" 
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"> 

<link rel="stylesheet" href="units.css">

<title>Profile Card</title>

</head>
<body>

<div class="container">

    <div class="card">

        <div class="cover"></div>

        <img src="https://static.vecteezy.com/system/resources/previews/024/183/502/non_2x/male-avatar-portrait-of-a-young-man-with-a-beard-illustration-of-male-character-in-modern-color-style-vector.jpg" class="profile">

        <div class="content">

            <h2>CodingLab</h2>
            <p>Influencer</p>

            <div class="social">

                <a><i class="fa-brands fa-facebook"></i></a>

                <a ><i class="fa-brands fa-twitter"></i></a>

                <a ><i class="fa-brands fa-instagram"></i></a>

                <a><i class="fa-brands fa-youtube"></i></a>

            </div>

            <div class="buttons">

                <button>Subscribe</button>

                <button>Message</button>

            </div>

            <div class="stats">

                
                <span><i class="fa-solid fa-heart"></i> 60.4k</span>
                <span><i class="fa-solid fa-comment"></i> 20k</span>

                <span><i class="fa-solid fa-share"></i> 12.4k</span>

            </div>

        </div>

    </div>

</div>

</body>
</html>
